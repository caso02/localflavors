name: LocalFlavors
options:
  bundleIdPrefix: com.localflavors
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 11.0.0

targets:
  LocalFlavors:
    type: application
    platform: iOS
    sources:
      - path: LocalFlavors
    settings:
      base:
        INFOPLIST_FILE: LocalFlavors/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.localflavors.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Firebase
        product: FirebaseFunctions
    info:
      path: LocalFlavors/Info.plist
      properties:
        CFBundleName: Local Flavors
        CFBundleDisplayName: Local Flavors
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "Local Flavors braucht Kamerazugriff um Speisekarten zu scannen."
        NSLocationWhenInUseUsageDescription: "Local Flavors erkennt automatisch in welchem Restaurant du bist."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
